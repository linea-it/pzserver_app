name: "pz"

services:
  database:
    image: postgres:13.6-alpine
    env_file:
      - .env
    expose:
      # Deixa a porta do banco de dados acessivel
      # para ferramentas externas como o dbeaver por exemplo.
      - 5432
    volumes:
      - ./pg_data:/var/lib/postgresql/data

  backend: &pzbackend
    build:
      context: ./backend
      args:
        - "USERID=${USERID:-1000}"
        - "GROUPID=${GROUPID:-1000}"
        - "USERNAME=${USERNAME:-pzapp}"
    command: /start.sh
    user: "${USERID:-1000}:${GROUPID:-1000}"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./archive/log/backend:/archive/log
      - ./archive/data:/archive/data
      # - ./saml2:/saml2    # uncomment if authentication with github is required
    depends_on:
      - database

  frontend:
    image: node:lts
    user: "1000:1000"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./.env.local:/app/.env.local
    stdin_open: true
    command: yarn dev

  pzbeat:
    <<: *pzbackend
    command: /app/pz-beat.sh
    depends_on:
      - backend

  pzworker:
    <<: *pzbackend
    command: /app/worker.sh
    depends_on:
      - backend

  nginx:
    image: nginx:1.21.6-alpine
    ports:
      - 80:8080
    volumes:
      - ./nginx_development.conf:/etc/nginx/conf.d/default.conf:ro
      - ./archive/data:/var/www/data
      - ./backend/htmlcov:/var/www/coverage
    depends_on:
      - backend
      - frontend

  rabbitmq:
    image: "rabbitmq:3.12.12-management"
    hostname: "rabbitmq"
    env_file:
      - .env
    ports:
      - "15672:15672"
      - "5672:5672"
