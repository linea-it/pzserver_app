name: "pz"

services:
  backend:
    # ATENÇÃO: Substitua a imagem pela versão desejada
    &pzbackend
    image: linea/pzserver:backend_<VERSION>
    command: ./entrypoint.sh
    env_file:
      - .env
    volumes:
      - ./archive/data:/archive/data
      - ./archive/log/backend:/log

  frontend:
    # ATENÇÃO: Substitua a imagem pela versão desejada
    image: linea/pzserver:frontend_<VERSION>
    volumes:
      - ./.env.local:/app/.env.local

  pzbeat:
    <<: *pzbackend
    command: /app/pz-beat.sh
    depends_on:
      - backend

  pzworker:
    <<: *pzbackend
    command: /app/worker.sh
    depends_on:
      - backend

  nginx:
    image: nginx:1.21.6-alpine
    ports:
      # ATENÇÃO: Altere a porta para uma porta compativel com o ambiente.
      - <PORT>:8080
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./archive/data:/var/www/data
    depends_on:
      - backend
      - frontend

  rabbitmq:
    image: "rabbitmq:3.12.12-management"
    hostname: "rabbitmq"
    env_file:
      - .env
    ports:
      - "15672:15672"
      - "5672:5672"
